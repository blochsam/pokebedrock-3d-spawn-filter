<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="pokegradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DC0A2D;stop-opacity:1" />
      <stop offset="48%" style="stop-color:#DC0A2D;stop-opacity:1" />
      <stop offset="48%" style="stop-color:#222;stop-opacity:1" />
      <stop offset="52%" style="stop-color:#222;stop-opacity:1" />
      <stop offset="52%" style="stop-color:#f5f5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5f5f5;stop-opacity:1" />
    </linearGradient>
    <filter id="pixelate">
      <feTurbulence type="fractalNoise" baseFrequency="0" numOctaves="1" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="12" fill="#1a1a2e"/>

  <!-- Pokeball stripe -->
  <rect y="95" width="800" height="10" fill="#DC0A2D" opacity="0.6"/>

  <!-- Top red glow -->
  <rect width="800" height="95" rx="12" fill="#DC0A2D" opacity="0.08"/>

  <!-- Pixel grid overlay -->
  <pattern id="grid" width="8" height="8" patternUnits="userSpaceOnUse">
    <rect width="8" height="8" fill="none" stroke="#fff" stroke-width="0.3" opacity="0.04"/>
  </pattern>
  <rect width="800" height="200" rx="12" fill="url(#grid)"/>

  <!-- Pokeball icon left -->
  <circle cx="60" cy="100" r="28" fill="none" stroke="#DC0A2D" stroke-width="2.5" opacity="0.3"/>
  <line x1="32" y1="100" x2="88" y2="100" stroke="#DC0A2D" stroke-width="2.5" opacity="0.3"/>
  <circle cx="60" cy="100" r="8" fill="none" stroke="#DC0A2D" stroke-width="2" opacity="0.3"/>

  <!-- Title -->
  <text x="400" y="72" text-anchor="middle" font-family="'Courier New', monospace" font-size="32" font-weight="bold" fill="#f5f5f5" letter-spacing="2">PokeBedrock</text>
  <text x="400" y="110" text-anchor="middle" font-family="'Courier New', monospace" font-size="24" fill="#DC0A2D" letter-spacing="4">3D SPAWN FILTER</text>
  <text x="400" y="145" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#888" letter-spacing="1">removes 2D-only pokemon from your server</text>

  <!-- Version pill -->
  <rect x="340" y="158" width="120" height="22" rx="11" fill="#DC0A2D" opacity="0.15" stroke="#DC0A2D" stroke-width="1" stroke-opacity="0.3"/>
  <text x="400" y="173" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#DC0A2D">v1.0.0 · 488</text>

  <!-- Pokeball icon right -->
  <circle cx="740" cy="100" r="28" fill="none" stroke="#f5f5f5" stroke-width="2.5" opacity="0.15"/>
  <line x1="712" y1="100" x2="768" y2="100" stroke="#f5f5f5" stroke-width="2.5" opacity="0.15"/>
  <circle cx="740" cy="100" r="8" fill="none" stroke="#f5f5f5" stroke-width="2" opacity="0.15"/>

  <!-- Corner accents -->
  <rect x="12" y="12" width="3" height="16" rx="1" fill="#DC0A2D" opacity="0.4"/>
  <rect x="12" y="12" width="16" height="3" rx="1" fill="#DC0A2D" opacity="0.4"/>
  <rect x="785" y="12" width="3" height="16" rx="1" fill="#DC0A2D" opacity="0.4"/>
  <rect x="772" y="12" width="16" height="3" rx="1" fill="#DC0A2D" opacity="0.4"/>
  <rect x="12" y="172" width="3" height="16" rx="1" fill="#f5f5f5" opacity="0.2"/>
  <rect x="12" y="185" width="16" height="3" rx="1" fill="#f5f5f5" opacity="0.2"/>
  <rect x="785" y="172" width="3" height="16" rx="1" fill="#f5f5f5" opacity="0.2"/>
  <rect x="772" y="185" width="16" height="3" rx="1" fill="#f5f5f5" opacity="0.2"/>
</svg>
